# Neaven automation engine — self-hosted Activepieces (MIT core), local dev.
# Isolated stack: own Postgres + Redis, mirroring how it runs in production.
# The bridge page (./bridge/embed-bridge.html) is volume-mounted into the
# frontend build output so it is served same-origin by the stock image —
# no source patching, no commercial embed SDK.
services:
  activepieces:
    # Built from /automation source with Neaven branding (theme.ts, styles.css)
    image: neaven-automation:dev
    container_name: neaven-automation-engine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    environment:
      AP_FRONTEND_URL: http://localhost:8080
      AP_ENCRYPTION_KEY: 6f0f8b2fce4f4d3e9a1b7c5d8e2f4a6b
      AP_JWT_SECRET: neaven-dev-jwt-secret-3f9c1e7a5b2d
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_USERNAME: activepieces
      AP_POSTGRES_PASSWORD: ap-dev-password
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: "6379"
      AP_TELEMETRY_ENABLED: "false"
      # Lets the Neaven app iframe the builder (CSP frame-ancestors).
      # Comma-separated origins; production adds https://neaven.net here.
      AP_ALLOWED_EMBED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3003
      # The silent-auth bridge provisions one engine user per founder via the
      # public sign-up API; without this the platform is invitation-only and
      # every founder after the first gets INVITATION_ONLY_SIGN_UP. In
      # production the auth endpoints must be blocked at the proxy except
      # from the Neaven app server (see docs/neaven-infrastructure-reference.md).
      AP_ALLOW_OPEN_SIGN_UP: "true"
    volumes:
      # The source-built image serves the frontend via fastify-static from
      # dist/packages/web; a real file there is served before the SPA fallback.
      - ./bridge/embed-bridge.html:/usr/src/app/dist/packages/web/embed-bridge.html:ro
      # LF copy of the entrypoint — the Windows checkout baked CRLF into the image
      - ./docker-entrypoint.sh:/usr/src/app/docker-entrypoint.sh:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: neaven-automation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: activepieces
      POSTGRES_PASSWORD: ap-dev-password
    volumes:
      - ap_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: neaven-automation-redis
    restart: unless-stopped
    volumes:
      - ap_redis_data:/data

volumes:
  ap_postgres_data:
  ap_redis_data:
