# Production stack for the Neaven web app ONLY.
#
# This is an independent Docker Compose project ("neaven-web"). It deliberately
# does NOT define or touch Caddy, Postgres, Redis, PR-Agent or Activepieces —
# those run from their own compose files on the server and are left untouched.
# It only *attaches* to the pre-existing external networks they created.
services:
  web:
    build:
      context: ./app
    image: neaven-web:latest
    container_name: neaven-web
    restart: unless-stopped
    # App API keys (Anthropic, Groq, Clerk, Resend, GitHub App IDs, …) come from
    # app/.env, written on the server from the PROD_ENV_FILE GitHub secret.
    env_file:
      - ./app/.env
    environment:
      # --- Datastore wiring to the core stack (~/neaven/docker-compose.yml) ---
      # `postgres` and `redis` resolve by container name over neaven_default.
      # Set here (not in the env file) so the correct in-network hostnames always
      # win, even if a stale localhost value is present in PROD_ENV_FILE.
      #
      # DB credential. Must match the `neaven` role password set via ALTER USER
      # in the production Postgres, and POSTGRES_PASSWORD in ~/neaven/docker-compose.yml.
      # NOTE: this is a real secret living in a (private) git repo. To take it out
      # of git later, switch to ${POSTGRES_PASSWORD} interpolation sourced from a
      # server-side .env — see the deploy notes.
      DATABASE_URL: "postgresql://neaven:ofQ2OZIOTzH0Nh7pSwMTEGlyFixos4Nz0M6TmEHF@postgres:5432/neaven_db"
      REDIS_URL: "redis://redis:6379"
    volumes:
      # GitHub App private key — mounted from the server, same pattern PR-Agent
      # uses for its .secrets.toml (host file → container path, read-only).
      # Place the key at ~/neaven-web/secrets/github-private-key.pem on the server.
      # Container path matches GITHUB_APP_PRIVATE_KEY_PATH=./secrets/github-private-key.pem
      # (the app's WORKDIR is /app).
      - ./secrets/github-private-key.pem:/app/secrets/github-private-key.pem:ro
    ports:
      # Loopback only, NOT public. Host port 3001 because PR-Agent already owns
      # 127.0.0.1:3000. Caddy reaches this container as `neaven-web` over
      # neaven_shared, so a public route never needs this published port.
      - "127.0.0.1:3001:3000"
    networks:
      - neaven_default # reach postgres + redis by container name
      - neaven_shared # let Caddy route to this container by name

# Both networks are created and owned by the core/PR-Agent stacks. We attach as
# external — this file never creates or mutates them.
networks:
  neaven_default:
    external: true
  neaven_shared:
    external: true
